<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathBros - Tablas de Multiplicar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700&display=swap');

  :root {
    --sky: #5c94fc;
    --ground: #c84c0c;
    --ground-top: #6aaa40;
    --mario-red: #e52222;
    --mario-blue: #2038ec;
    --coin: #f8d038;
    --pipe: #00a800;
    --correct: #00c800;
    --wrong: #e52222;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--sky);
    font-family: 'Press Start 2P', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  #game-wrapper {
    width: 100%;
    max-width: 860px;
    display: flex;
    flex-direction: column;
  }

  /* BANNER */
  #player-banner {
    background: #000;
    border-bottom: 3px solid #e52222;
    text-align: center;
    padding: 7px 10px;
  }
  #player-banner-inner { display: flex; justify-content: center; align-items: center; gap: 12px; }
  .banner-item { color: var(--coin); font-size: 10px; letter-spacing: 3px; text-shadow: 2px 2px 0 #c84c0c; }
  .banner-item span { color: #fff; }

  /* HUD */
  #hud {
    background: #000; color: var(--coin);
    padding: 10px 20px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; border-bottom: 4px solid var(--coin); letter-spacing: 1px;
  }
  #hud .score-block { display: flex; flex-direction: column; gap: 4px; text-align: center; }
  #hud .score-block span:first-child { color: #aaa; font-size: 8px; }
  #hud .score-block span:last-child  { color: #fff; font-size: 12px; }

  /* SESSION BAR */
  #session-bar {
    background: #111; border-bottom: 3px solid #333;
    padding: 6px 16px;
    display: flex; justify-content: center; align-items: center; gap: 14px;
    font-size: 9px; color: #aaa; letter-spacing: 1px;
  }
  .session-item { color: #fff; }
  .session-item span { color: var(--coin); font-size: 11px; }
  .session-sep { color: #444; }

  /* GAME CANVAS */
  #game-canvas {
    position: relative; height: 340px;
    background: linear-gradient(180deg, #5c94fc 0%, #7ab0ff 80%, #5c94fc 100%);
    overflow: hidden;
    border-left: 4px solid #000; border-right: 4px solid #000;
    transition: background 0.8s ease;
  }
  #game-canvas.boss-mode {
    background: linear-gradient(180deg, #110022 0%, #330055 60%, #110022 100%);
  }

  /* CLOUDS */
  .cloud {
    position: absolute; background: white; border-radius: 20px;
    animation: cloudMove linear infinite; opacity: 0.9;
  }
  .cloud::before,.cloud::after { content:''; position:absolute; background:white; border-radius:50%; }
  .cloud::before { width:60%; height:150%; top:-60%; left:10%; }
  .cloud::after  { width:40%; height:130%; top:-40%; right:10%; }
  .cloud1 { width:80px;  height:28px; top:30px; animation-duration:20s; }
  .cloud2 { width:60px;  height:22px; top:70px; animation-duration:28s; animation-delay:-10s; }
  .cloud3 { width:100px; height:34px; top:20px; animation-duration:25s; animation-delay:-6s; }
  @keyframes cloudMove { from{left:110%} to{left:-150px} }
  #game-canvas.boss-mode .cloud { opacity:0; transition:opacity 0.8s; }

  /* GROUND */
  #ground {
    position:absolute; bottom:0; width:100%; height:60px;
    background:var(--ground); border-top:8px solid var(--ground-top);
  }
  #ground::after {
    content:''; position:absolute;
    top:8px; left:0; right:0; height:10px;
    background:repeating-linear-gradient(90deg,rgba(0,0,0,0.15) 0,rgba(0,0,0,0.15) 2px,transparent 2px,transparent 40px);
  }

  /* PROGRESS */
  #progress-bar-track {
    position:absolute; bottom:68px; left:10px; right:10px; height:8px;
    background:rgba(0,0,0,0.3); border-radius:4px; overflow:hidden;
  }
  #progress-fill {
    height:100%;
    background:linear-gradient(90deg,var(--coin),#ff8800);
    border-radius:4px; transition:width 0.5s ease; width:0%;
  }

  /* FLAG */
  #flag { position:absolute; right:30px; bottom:60px; display:flex; flex-direction:column; align-items:center; }
  #flag-pole   { width:4px; height:120px; background:#888; margin:0 auto; }
  #flag-banner { width:24px; height:18px; background:var(--pipe); position:absolute; top:0; left:4px; clip-path:polygon(0 0,100% 50%,0 100%); }
  #flag-star   { font-size:16px; position:absolute; top:-20px; left:50%; transform:translateX(-50%); }

  /* MARIO */
  #mario {
    position:absolute; bottom:60px; left:30px;
    width:40px; height:48px;
    transition:left 0.5s ease; z-index:10;
  }
  #mario.jumping { animation:jump 0.5s ease; }
  #mario.hurt    { animation:hurt 0.4s ease; }
  @keyframes jump { 0%{transform:translateY(0)} 40%{transform:translateY(-80px)} 100%{transform:translateY(0)} }
  @keyframes hurt {
    0%,100%{transform:translateX(0);filter:brightness(1)}
    25%{transform:translateX(-15px);filter:brightness(3) hue-rotate(30deg)}
    75%{transform:translateX(-10px);filter:brightness(2)}
  }
  .mario-svg { width:40px; height:48px; }

  /* PIPES */
  .pipe {
    position:absolute; bottom:60px; width:40px;
    background:var(--pipe); border:3px solid #006400; border-radius:4px 4px 0 0;
  }
  .pipe::before {
    content:''; position:absolute;
    top:-8px; left:-5px; right:-5px; height:14px;
    background:#00a800; border:3px solid #006400; border-radius:4px;
  }
  .pipe1 { height:50px; left:20%; }
  .pipe2 { height:65px; left:50%; }
  .pipe3 { height:45px; left:75%; }

  /* ===== BOWSER ===== */
  #bowser-container {
    position:absolute;
    bottom:103px;        /* on top of pipe3 (60ground+45pipe-2) */
    left:calc(75% - 18px);
    width:76px; z-index:15;
    display:flex; flex-direction:column; align-items:center;
  }
  #bowser-label {
    display:none; font-size:6px; color:#ff4400;
    letter-spacing:1px; margin-bottom:3px;
    text-shadow:1px 1px 0 #000;
  }
  #bowser-hp-bar {
    display:none; width:76px; height:8px;
    background:#333; border:2px solid #fff; border-radius:3px; overflow:hidden; margin-bottom:4px;
  }
  #bowser-hp-fill {
    height:100%;
    background:linear-gradient(90deg,#ff2200,#ff6600);
    width:100%; transition:width 0.4s ease;
  }
  #bowser-svg-wrap.idle     { animation:bowserBob 1s ease-in-out infinite; }
  #bowser-svg-wrap.hit      { animation:bowserHit 0.35s ease; }
  #bowser-svg-wrap.attacking{ animation:bowserAtk 0.5s ease; }
  #bowser-svg-wrap.defeated { animation:bowserFall 0.7s ease forwards; }
  @keyframes bowserBob  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  @keyframes bowserHit  { 0%,100%{filter:brightness(1);transform:scale(1)} 40%{filter:brightness(4) saturate(0);transform:scale(1.15)} }
  @keyframes bowserAtk  { 0%,100%{filter:brightness(1)} 30%,70%{filter:brightness(2.5) hue-rotate(200deg)} }
  @keyframes bowserFall { 0%{transform:rotate(0) translateY(0);opacity:1} 60%{transform:rotate(-30deg) translateY(10px);opacity:.7} 100%{transform:rotate(-90deg) translateY(60px);opacity:0} }

  /* FIREBALL */
  .fireball {
    position:absolute; font-size:22px;
    animation:fbFly 0.7s ease forwards;
    pointer-events:none; z-index:20;
  }
  @keyframes fbFly { 0%{opacity:1;transform:translateX(0) scale(1)} 100%{opacity:0;transform:translateX(-130px) scale(0.3)} }

  /* COIN */
  .coin-anim {
    position:absolute; font-size:20px;
    animation:coinUp 0.8s ease forwards;
    pointer-events:none; z-index:20;
  }
  @keyframes coinUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-60px) scale(1.5)} }

  /* QUESTION AREA */
  #question-area {
    background:#000; border-top:4px solid var(--coin);
    padding:16px 20px;
    display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  #question-area.boss-fight { border-top-color:#ff4400; background:#0d0000; }
  #question-title { color:var(--coin); font-size:10px; letter-spacing:2px; text-align:center; }
  #question-area.boss-fight #question-title { color:#ff4400; }
  #question-text  { color:#fff; font-size:20px; text-align:center; letter-spacing:2px; text-shadow:3px 3px 0 #333; }

  #boss-status {
    display:none;
    background:#1a0000; border:2px solid #ff4400;
    padding:6px 14px; font-size:8px; color:#ff8800;
    letter-spacing:1px; text-align:center; border-radius:4px;
    line-height:1.8;
  }

  #answers-grid {
    display:grid; grid-template-columns:repeat(4,1fr);
    gap:8px; width:100%; max-width:600px;
  }
  .answer-btn {
    background:var(--mario-blue); color:#fff; border:3px solid #fff;
    padding:10px 4px;
    font-family:'Press Start 2P',monospace; font-size:12px;
    cursor:pointer; text-align:center;
    transition:transform .1s,background .1s;
    outline:none; box-shadow:0 4px 0 #001080;
  }
  .answer-btn:hover  { background:#3050ff; transform:translateY(-2px); box-shadow:0 6px 0 #001080; }
  .answer-btn:active { transform:translateY(2px); box-shadow:0 2px 0 #001080; }
  .answer-btn.correct{ background:var(--correct)!important; border-color:#0f0; box-shadow:0 0 12px #0f0; animation:cpulse .4s ease; }
  .answer-btn.wrong  { background:var(--wrong)!important;   border-color:#f00; animation:cshake .4s ease; }
  #question-area.boss-fight .answer-btn { background:#6b0000; box-shadow:0 4px 0 #2a0000; }
  #question-area.boss-fight .answer-btn:hover { background:#a00000; }
  @keyframes cpulse { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
  @keyframes cshake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  #feedback { font-size:12px; min-height:20px; text-align:center; letter-spacing:1px; }
  #lives-display { display:flex; gap:6px; align-items:center; }
  .heart { font-size:14px; }

  /* OVERLAY */
  #overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.85); z-index:100;
    flex-direction:column; align-items:center; justify-content:center; gap:20px;
    font-family:'Press Start 2P',monospace;
  }
  #overlay.show { display:flex; }
  #overlay-title { font-size:24px; color:var(--coin); text-shadow:4px 4px 0 #333; text-align:center; line-height:1.6; }
  #overlay-sub   { font-size:11px; color:#fff; text-align:center; line-height:2; white-space:pre-line; }
  #overlay-btn {
    background:var(--mario-red); color:#fff; border:4px solid #fff;
    padding:12px 24px;
    font-family:'Press Start 2P',monospace; font-size:12px;
    cursor:pointer; box-shadow:0 5px 0 #800; transition:transform .1s; margin-top:10px;
  }
  #overlay-btn:hover  { transform:scale(1.05); }
  #overlay-btn:active { transform:translateY(3px); box-shadow:0 2px 0 #800; }

  @media(max-width:600px){
    #answers-grid { grid-template-columns:repeat(2,1fr); }
    #question-text { font-size:16px; }
    #game-canvas   { height:260px; }
  }
</style>
</head>

<script>
// ============================================================
// GAME STATE
// ============================================================
let score = 0, lives = 5, progress = 0;
let currentQuestion = null, answering = true;
let sessionWins = 0, sessionLosses = 0;

const MARIO_MIN_LEFT = 30;
const STEP_FWD  = 4;   // % forward per correct answer (normal)
const STEP_BACK = 3;   // % backward per wrong answer (normal)

// BOWSER
const BOWSER_TRIGGER  = 70;   // % progress that starts the boss fight
const BOWSER_MAX_HP   = 2;    // hits needed to defeat him
let bowserActive   = false;
let bowserDefeated = false;
let bowserHP       = BOWSER_MAX_HP;
let bossWrongStreak = 0;  // consecutive wrongs during fight
let bossRightStreak = 0;  // consecutive rights during fight

// ============================================================
// QUESTION
// ============================================================
function generateQuestion() {
  const a = Math.floor(Math.random() * 5) + 1;   // 1-5
  const b = Math.floor(Math.random() * 10) + 1;  // 1-10
  const correct = a * b;
  const wrongs = new Set();
  while (wrongs.size < 3) {
    let w = correct + (Math.floor(Math.random() * 14) - 7);
    if (w > 0 && w !== correct) wrongs.add(w);
  }
  return { a, b, correct, options: [...wrongs, correct].sort(() => Math.random() - 0.5) };
}

function renderQuestion() {
  if (!answering) return;
  currentQuestion = generateQuestion();
  document.getElementById('q-num').textContent = `${currentQuestion.a} × ${currentQuestion.b}`;

  const isBoss = bowserActive && !bowserDefeated;
  const qa    = document.getElementById('question-area');
  const title = document.getElementById('question-title');
  const bstat = document.getElementById('boss-status');

  if (isBoss) {
    qa.classList.add('boss-fight');
    title.textContent = '⚔️ ¡BATALLA CONTRA BOWSER!';
    bstat.style.display = 'block';
    refreshBossStatus();
    showFeedback('🔥 ¡Acierta 2 seguidas para vencer a Bowser!', '#ff8800');
  } else {
    qa.classList.remove('boss-fight');
    title.textContent = '¡RESPONDE PARA AVANZAR!';
    bstat.style.display = 'none';
    showFeedback('Elige la respuesta correcta para que Mario avance 🍄', '#fff');
  }

  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';
  currentQuestion.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = opt;
    btn.onclick = () => handleAnswer(opt, btn);
    grid.appendChild(btn);
  });
}

function refreshBossStatus() {
  const hits   = '⚔️'.repeat(bossRightStreak) || '—';
  const misses = '❌'.repeat(bossWrongStreak)  || '—';
  const warn   = bossWrongStreak === 1 ? ' ⚠️ ¡Un fallo más y Bowser ATACA!' : '';
  document.getElementById('boss-status').innerHTML =
    `Golpes dados: ${hits} &nbsp;|&nbsp; Fallos seguidos: ${misses}${warn}`;
}

// ============================================================
// HANDLE ANSWER
// ============================================================
function handleAnswer(chosen, btn) {
  if (!answering) return;
  answering = false;

  const allBtns = document.querySelectorAll('.answer-btn');
  allBtns.forEach(b => b.disabled = true);

  const isCorrect = chosen === currentQuestion.correct;
  const isBoss    = bowserActive && !bowserDefeated;

  if (isCorrect) {
    btn.classList.add('correct');
    score += currentQuestion.a * currentQuestion.b * 10;
    updateScore();
    spawnCoin();
    marioJump();

    if (isBoss) {
      bossWrongStreak = 0;
      bossRightStreak++;
      bowserHP--;
      updateBowserHP();
      animBowser('hit');

      if (bowserHP <= 0) {
        showFeedback('💥 ¡BOWSER DERROTADO! ¡Camino libre!', '#f8d038');
        setTimeout(defeatBowser, 700);
        return;
      } else {
        showFeedback(`⚔️ ¡Buen golpe! ¡Un acierto más para acabar con Bowser!`, '#00ff00');
      }

    } else {
      progress = Math.min(100, progress + STEP_FWD);
      updateProgress();
      checkBowserTrigger();
      showFeedback(`✅ ¡Correcto! ${currentQuestion.a} × ${currentQuestion.b} = ${currentQuestion.correct}`, '#00ff00');
      if (progress >= 100) { setTimeout(showWin, 1000); return; }
    }

  } else {
    // WRONG
    btn.classList.add('wrong');
    allBtns.forEach(b => {
      if (parseInt(b.textContent) === currentQuestion.correct) b.classList.add('correct');
    });

    if (isBoss) {
      bossRightStreak = 0;
      bossWrongStreak++;
      animBowser('attacking');

      if (bossWrongStreak >= 2) {
        // BOWSER FIRES
        bossWrongStreak = 0;
        lives--;
        updateLives();
        spawnFireball();
        marioHurt();
        progress = Math.max(0, progress - STEP_BACK * 2);
        updateProgress();
        showFeedback('🔥 ¡Bowser te lanzó fuego! Mario retrocede. ¡Concentración!', '#ff3300');
        if (lives <= 0) { setTimeout(showGameOver, 1200); return; }
      } else {
        showFeedback(`❌ Era ${currentQuestion.correct}. ¡Cuidado, un fallo más y Bowser ataca!`, '#ff8800');
      }

    } else {
      lives--;
      updateLives();
      marioHurt();
      progress = Math.max(0, progress - STEP_BACK);
      updateProgress();
      showFeedback(`❌ Era ${currentQuestion.correct}. Mario retrocede...`, '#ff4444');
      if (lives <= 0) { setTimeout(showGameOver, 1200); return; }
    }
  }

  setTimeout(() => { answering = true; renderQuestion(); }, 1400);
}

// ============================================================
// BOWSER LOGIC
// ============================================================
function checkBowserTrigger() {
  if (!bowserDefeated && !bowserActive && progress >= BOWSER_TRIGGER) {
    bowserActive    = true;
    bowserHP        = BOWSER_MAX_HP;
    bossWrongStreak = 0;
    bossRightStreak = 0;
    document.getElementById('bowser-hp-bar').style.display  = 'block';
    document.getElementById('bowser-label').style.display   = 'block';
    document.getElementById('game-canvas').classList.add('boss-mode');
    updateBowserHP();
  }
}

function updateBowserHP() {
  document.getElementById('bowser-hp-fill').style.width = (bowserHP / BOWSER_MAX_HP * 100) + '%';
}

function animBowser(cls) {
  const w = document.getElementById('bowser-svg-wrap');
  w.classList.remove('idle','hit','attacking','defeated');
  void w.offsetWidth;
  w.classList.add(cls);
  w.addEventListener('animationend', () => {
    w.classList.remove(cls);
    if (cls !== 'defeated') w.classList.add('idle');
  }, { once: true });
}

function defeatBowser() {
  bowserDefeated = true;
  bowserActive   = false;
  animBowser('defeated');
  document.getElementById('game-canvas').classList.remove('boss-mode');
  document.getElementById('question-area').classList.remove('boss-fight');
  document.getElementById('question-title').textContent = '¡RESPONDE PARA AVANZAR!';
  document.getElementById('boss-status').style.display  = 'none';
  score += 500;
  updateScore();
  setTimeout(() => {
    document.getElementById('bowser-container').style.display = 'none';
    answering = true;
    renderQuestion();
  }, 2000);
}

// ============================================================
// ANIMATIONS / HELPERS
// ============================================================
function spawnFireball() {
  const bc = document.getElementById('bowser-container');
  const fb = document.createElement('div');
  fb.className = 'fireball';
  fb.textContent = '🔥';
  fb.style.left   = (bc.offsetLeft - 20) + 'px';
  fb.style.bottom = '115px';
  document.getElementById('game-canvas').appendChild(fb);
  setTimeout(() => fb.remove(), 750);
}

function spawnCoin() {
  const mario = document.getElementById('mario');
  const coin  = document.createElement('div');
  coin.className  = 'coin-anim';
  coin.textContent = '🪙';
  coin.style.left   = (mario.offsetLeft + 10) + 'px';
  coin.style.bottom = '100px';
  document.getElementById('game-canvas').appendChild(coin);
  setTimeout(() => coin.remove(), 900);
}

function marioJump() {
  const el = document.getElementById('mario');
  el.classList.remove('jumping','hurt'); void el.offsetWidth;
  el.classList.add('jumping');
  el.addEventListener('animationend', () => el.classList.remove('jumping'), { once: true });
}

function marioHurt() {
  const el = document.getElementById('mario');
  el.classList.remove('jumping','hurt'); void el.offsetWidth;
  el.classList.add('hurt');
  el.addEventListener('animationend', () => el.classList.remove('hurt'), { once: true });
}

function updateProgress() {
  document.getElementById('progress-fill').style.width    = progress + '%';
  document.getElementById('progress-display').textContent = Math.round(progress) + '%';
  const w    = document.getElementById('game-canvas').offsetWidth;
  const max  = w - 80;
  const left = MARIO_MIN_LEFT + ((max - MARIO_MIN_LEFT) * progress / 100);
  document.getElementById('mario').style.left = left + 'px';
}

function updateScore() {
  document.getElementById('score-display').textContent = String(score).padStart(6,'0');
}

function updateLives() {
  document.querySelectorAll('.heart').forEach((h,i) => { h.textContent = i < lives ? '❤️' : '🖤'; });
}

function showFeedback(msg, color) {
  const el = document.getElementById('feedback');
  el.textContent = msg; el.style.color = color;
}

// ============================================================
// WIN SOUND — Mario level clear jingle via Web Audio API
// ============================================================
function playMarioWin() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Mario course-clear melody: notes + durations
    const notes = [
      // "dah dah dah  dah-dah  daaah"
      [523.25, 0.12], [659.25, 0.12], [783.99, 0.12],
      [1046.5, 0.22], [783.99, 0.10], [1046.5, 0.40],
      [0,       0.05],
      [880.00,  0.14], [1108.73,0.14],[1318.51,0.14],
      [1760.00, 0.35]
    ];
    let t = ctx.currentTime + 0.05;
    notes.forEach(([freq, dur]) => {
      if (freq === 0) { t += dur; return; }
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.18, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.start(t); osc.stop(t + dur);
      t += dur;
    });
  } catch(e) { /* audio unavailable */ }
}

// ============================================================
// FIREWORKS
// ============================================================
let fwAnimId = null;

function startFireworks() {
  const canvas = document.getElementById('fireworks-canvas');
  canvas.style.display = 'block';
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  const ctx = canvas.getContext('2d');
  const particles = [];

  const colors = ['#f8d038','#ff4444','#44aaff','#44ff88','#ff88ff','#ffffff','#ff8800'];

  function spawnBurst() {
    const x = 60 + Math.random() * (canvas.width  - 120);
    const y = 30 + Math.random() * (canvas.height * 0.6);
    const color = colors[Math.floor(Math.random() * colors.length)];
    for (let i = 0; i < 40; i++) {
      const angle = (Math.PI * 2 / 40) * i + Math.random() * 0.3;
      const speed = 2 + Math.random() * 4;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1,
        color,
        radius: 2 + Math.random() * 2,
        decay: 0.015 + Math.random() * 0.01
      });
    }
  }

  let burstTimer = 0;
  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    burstTimer++;
    if (burstTimer % 28 === 0) spawnBurst();

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.08; // gravity
      p.vx *= 0.98;
      p.alpha -= p.decay;
      if (p.alpha <= 0) { particles.splice(i, 1); continue; }
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle   = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur  = 6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    fwAnimId = requestAnimationFrame(loop);
  }
  spawnBurst(); spawnBurst();
  loop();
}

function stopFireworks() {
  if (fwAnimId) { cancelAnimationFrame(fwAnimId); fwAnimId = null; }
  const canvas = document.getElementById('fireworks-canvas');
  canvas.style.display = 'none';
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ============================================================
// WIN / GAME OVER
// ============================================================
function showWin() {
  sessionWins++;
  document.getElementById('wins-count').textContent = sessionWins;
  playMarioWin();
  startFireworks();
  setTimeout(() => {
    document.getElementById('overlay-title').textContent = '🏆 ¡GANASTE! 🏆';
    document.getElementById('overlay-sub').textContent =
      `¡DANIEL SALAZAR llegó a la meta!\nPuntos: ${String(score).padStart(6,'0')}\n¡Eres un crack en las tablas! 🏆\n\n🏆 Victorias hoy: ${sessionWins}  💀 Derrotas: ${sessionLosses}`;
    document.getElementById('overlay').classList.add('show');
  }, 1800);
}

function showGameOver() {
  sessionLosses++;
  document.getElementById('losses-count').textContent = sessionLosses;
  document.getElementById('overlay-title').textContent = '💀 GAME OVER 💀';
  document.getElementById('overlay-sub').textContent =
    `¡Ánimo DANIEL SALAZAR!\nPerdiste todas las vidas...\nPuntos: ${String(score).padStart(6,'0')}\n¡Inténtalo de nuevo!\n\n🏆 Victorias hoy: ${sessionWins}  💀 Derrotas: ${sessionLosses}`;
  document.getElementById('overlay').classList.add('show');
}

// ============================================================
// START / RESTART
// ============================================================
function startGame() {
  stopFireworks();
  score = 0; lives = 5; progress = 0; answering = true;
  bowserActive = false; bowserDefeated = false;
  bowserHP = BOWSER_MAX_HP; bossWrongStreak = 0; bossRightStreak = 0;

  document.getElementById('overlay').classList.remove('show');
  document.getElementById('game-canvas').classList.remove('boss-mode');
  document.getElementById('question-area').classList.remove('boss-fight');
  document.getElementById('question-title').textContent = '¡RESPONDE PARA AVANZAR!';
  document.getElementById('boss-status').style.display  = 'none';

  // Reset Bowser visuals
  const bc = document.getElementById('bowser-container');
  bc.style.display = '';
  document.getElementById('bowser-hp-bar').style.display = 'none';
  document.getElementById('bowser-label').style.display  = 'none';
  document.getElementById('bowser-hp-fill').style.width  = '100%';
  const wrap = document.getElementById('bowser-svg-wrap');
  wrap.classList.remove('defeated','hit','attacking');
  wrap.classList.add('idle');

  const mario = document.getElementById('mario');
  mario.classList.remove('jumping','hurt');
  mario.style.left = MARIO_MIN_LEFT + 'px';

  updateScore(); updateLives(); updateProgress();
  renderQuestion();
}

startGame();
</script>
