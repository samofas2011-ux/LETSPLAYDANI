<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro-Tablas 🚀</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; font-family:'Press Start 2P',monospace; color:#fff; overflow:hidden; height:100vh; display:flex; flex-direction:column; }

  /* HUD */
  #hud {
    background:rgba(0,0,20,.92); border-bottom:2px solid #1e3a5f;
    padding:8px 16px; display:flex; align-items:center; justify-content:space-between;
    gap:10px; flex-wrap:wrap; z-index:20; flex-shrink:0;
  }
  .hud-block { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .hud-label { font-size:6px; color:#4488aa; letter-spacing:1px; }
  .hud-val   { font-size:13px; color:#fff; }
  #lives-wrap { display:flex; gap:4px; }
  .life { font-size:14px; transition:opacity .3s; }
  .back-btn { font-size:7px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2); color:#94a3b8; padding:6px 10px; border-radius:6px; cursor:pointer; text-decoration:none; font-family:'Press Start 2P',monospace; white-space:nowrap; }
  .back-btn:hover { background:rgba(255,255,255,.2); color:#fff; }

  /* QUESTION BAR */
  #question-bar {
    background:rgba(0,0,30,.95); border-bottom:2px solid #0a2a4a;
    padding:8px 16px; text-align:center; z-index:20; flex-shrink:0;
  }
  #q-label { font-size:7px; color:#4488aa; letter-spacing:2px; margin-bottom:4px; }
  #q-text  { font-size:22px; color:#fff; text-shadow:0 0 20px #00aaff; letter-spacing:4px; }
  #q-hint  { font-size:7px; color:#334466; margin-top:3px; }

  /* CANVAS */
  #canvas-wrap { flex:1; position:relative; overflow:hidden; min-height:0; }
  #gameCanvas  { display:block; width:100%; height:100%; }

  /* TABLE SELECT SCREEN */
  #table-select-screen {
    position:absolute; inset:0; background:rgba(0,0,10,.97);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; z-index:50; padding:20px;
  }
  #table-select-screen h2 { font-size:clamp(11px,2.2vw,17px); color:#00ccff; text-shadow:0 0 20px #00aaff; text-align:center; line-height:2; }
  .table-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:380px; width:100%; }
  .tsel-btn {
    padding:13px 6px; border:2px solid; border-radius:10px; font-family:'Press Start 2P',monospace;
    font-size:10px; cursor:pointer; text-align:center; transition:all .2s;
    background:rgba(255,255,255,.04);
  }
  .tsel-btn:hover { transform:scale(1.07); filter:brightness(1.4); }
  .tsel-btn.t1{border-color:#f43f5e;color:#f43f5e} .tsel-btn.t2{border-color:#f97316;color:#f97316}
  .tsel-btn.t3{border-color:#eab308;color:#eab308} .tsel-btn.t4{border-color:#22c55e;color:#22c55e}
  .tsel-btn.t5{border-color:#06b6d4;color:#06b6d4} .tsel-btn.t6{border-color:#a855f7;color:#a855f7}
  .tsel-btn.t7{border-color:#ec4899;color:#ec4899} .tsel-btn.t8{border-color:#f59e0b;color:#f59e0b}
  .tsel-btn.t9{border-color:#10b981;color:#10b981}
  .tsel-all { border-color:#fff; color:#fff; grid-column:span 3; font-size:9px; }

  /* OVERLAY */
  #overlay {
    display:none; position:absolute; inset:0; background:rgba(0,0,10,.92);
    flex-direction:column; align-items:center; justify-content:center;
    gap:14px; z-index:60; text-align:center; padding:20px;
  }
  #overlay.show { display:flex; }
  #ov-emoji { font-size:54px; }
  #ov-title { font-size:clamp(12px,2vw,18px); color:#00ccff; line-height:2; }
  #ov-score { font-size:14px; color:#fbbf24; }
  #ov-sub   { font-size:8px; color:#4488aa; line-height:2.2; }
  .ov-btn { font-family:'Press Start 2P',monospace; font-size:9px; padding:11px 18px; border-radius:8px; border:none; cursor:pointer; transition:transform .1s; margin:2px; }
  .ov-btn:hover { transform:scale(1.05); }
  .ov-btn-cyan { background:#00aaff; color:#000; }
  .ov-btn-purple { background:#7c3aed; color:#fff; }
  .ov-btn-dark { background:rgba(255,255,255,.1); color:#fff; border:2px solid rgba(255,255,255,.2); }

  /* MOBILE CONTROLS */
  #mobile-controls {
    display:none; background:rgba(0,0,20,.95);
    border-top:2px solid #1e3a5f; padding:8px 16px;
    justify-content:space-between; align-items:center;
    z-index:20; flex-shrink:0;
  }
  .ctrl-btn {
    width:60px; height:60px; border-radius:50%;
    border:2px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.07); font-size:20px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }
  .ctrl-btn:active { background:rgba(255,255,255,.22); }
  #ctrl-fire { width:72px; height:72px; background:rgba(255,60,60,.18); border-color:rgba(255,60,60,.5); font-size:16px; }
  #ctrl-fire:active { background:rgba(255,60,60,.5); }
  @media (pointer:coarse) { #mobile-controls { display:flex; } }
</style>
</head>
<body>

<div id="hud">
  <a href="menu.html" class="back-btn">← MENÚ</a>
  <div class="hud-block"><div class="hud-label">PUNTOS</div><div class="hud-val" id="h-score">000000</div></div>
  <div class="hud-block"><div class="hud-label">TABLA</div><div class="hud-val" id="h-table">×1</div></div>
  <div class="hud-block"><div class="hud-label">NIVEL</div><div class="hud-val" id="h-level">1</div></div>
  <div class="hud-block"><div class="hud-label">VIDAS</div><div id="lives-wrap">
    <span class="life">🚀</span><span class="life">🚀</span><span class="life">🚀</span>
  </div></div>
</div>

<div id="question-bar">
  <div id="q-label">¡DISPARA AL RESULTADO CORRECTO!</div>
  <div id="q-text">? × ? = ?</div>
  <div id="q-hint">← → para moverte &nbsp;|&nbsp; ESPACIO para disparar</div>
</div>

<div id="canvas-wrap">
  <canvas id="gameCanvas"></canvas>

  <!-- TABLE SELECT -->
  <div id="table-select-screen">
    <h2>🚀 ASTRO-TABLAS 🚀<br><span style="font-size:.75em;color:#4488aa">Elige tu tabla</span></h2>
    <div class="table-grid">
      <button class="tsel-btn t1" onclick="startGame(1)">×1</button>
      <button class="tsel-btn t2" onclick="startGame(2)">×2</button>
      <button class="tsel-btn t3" onclick="startGame(3)">×3</button>
      <button class="tsel-btn t4" onclick="startGame(4)">×4</button>
      <button class="tsel-btn t5" onclick="startGame(5)">×5</button>
      <button class="tsel-btn t6" onclick="startGame(6)">×6</button>
      <button class="tsel-btn t7" onclick="startGame(7)">×7</button>
      <button class="tsel-btn t8" onclick="startGame(8)">×8</button>
      <button class="tsel-btn t9" onclick="startGame(9)">×9</button>
      <button class="tsel-btn tsel-all" onclick="startGame(0)">⭐ TODAS ⭐</button>
    </div>
  </div>

  <div id="overlay">
    <div id="ov-emoji">🚀</div>
    <div id="ov-title"></div>
    <div id="ov-score"></div>
    <div id="ov-sub"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:6px;">
      <button class="ov-btn ov-btn-cyan"   onclick="restartGame()">▶ REPETIR</button>
      <button class="ov-btn ov-btn-purple" onclick="showTableSelect()">🔢 TABLA</button>
      <button class="ov-btn ov-btn-dark"   onclick="window.location.href='menu.html'">← MENÚ</button>
    </div>
  </div>
</div>

<div id="mobile-controls">
  <button class="ctrl-btn" id="ctrl-left">◀</button>
  <button class="ctrl-btn" id="ctrl-fire">🔥<br><span style="font-size:9px">FUEGO</span></button>
  <button class="ctrl-btn" id="ctrl-right">▶</button>
</div>

<script>
// ─────────────────────────────────────────────
// CANVAS
// ─────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

function resize() {
  const w = document.getElementById('canvas-wrap');
  canvas.width  = w.clientWidth;
  canvas.height = w.clientHeight;
}
resize();
window.addEventListener('resize', resize);

// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const TABLE_HEX = {
  0:'#ffffff',1:'#f43f5e',2:'#f97316',3:'#eab308',
  4:'#22c55e',5:'#06b6d4',6:'#a855f7',7:'#ec4899',
  8:'#f59e0b',9:'#10b981'
};

// ASTEROID shape: all look the same — grey rocky, no color hint
const AST_FILL    = '#2a2a3a';
const AST_STROKE  = '#6688aa';
const AST_SHADOW  = '#4466aa';

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let animId = null, gameRunning = false;
let currentTableNum = 1;
let ship, bullets, asteroids, particles, floatingTexts;
let score, lives, level, questionsAnswered;
let correctAnswer, questionPool, questionIndex;
let fireCooldown = 0, shieldFlash = 0;
let levelUpTimer = 0;
let lastTime = 0;

// Input
const keys = { left:false, right:false, fire:false };

// ─────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code==='ArrowLeft' ||e.code==='KeyA') keys.left=true;
  if (e.code==='ArrowRight'||e.code==='KeyD') keys.right=true;
  if (e.code==='Space'||e.code==='ArrowUp')  { keys.fire=true; e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  if (e.code==='ArrowLeft' ||e.code==='KeyA') keys.left=false;
  if (e.code==='ArrowRight'||e.code==='KeyD') keys.right=false;
  if (e.code==='Space'||e.code==='ArrowUp')   keys.fire=false;
});

['touchstart','mousedown'].forEach(ev=>{
  document.getElementById('ctrl-left').addEventListener(ev, e=>{e.preventDefault();keys.left=true;},{passive:false});
  document.getElementById('ctrl-right').addEventListener(ev,e=>{e.preventDefault();keys.right=true;},{passive:false});
  document.getElementById('ctrl-fire').addEventListener(ev, e=>{e.preventDefault();keys.fire=true;},{passive:false});
});
['touchend','mouseup'].forEach(ev=>{
  document.getElementById('ctrl-left').addEventListener(ev, e=>{e.preventDefault();keys.left=false;},{passive:false});
  document.getElementById('ctrl-right').addEventListener(ev,e=>{e.preventDefault();keys.right=false;},{passive:false});
  document.getElementById('ctrl-fire').addEventListener(ev, e=>{e.preventDefault();keys.fire=false;},{passive:false});
});

// ─────────────────────────────────────────────
// STARS
// ─────────────────────────────────────────────
const STARS = Array.from({length:140}, ()=>({
  x:Math.random(), y:Math.random(),
  r:Math.random()*1.4+.3,
  spd:Math.random()*.5+.1,
  a:Math.random()*.6+.3,
}));

function drawStars() {
  STARS.forEach(s=>{
    s.y += s.spd/canvas.height;
    if(s.y>1){s.y=0;s.x=Math.random();}
    ctx.save(); ctx.globalAlpha=s.a; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x*canvas.width,s.y*canvas.height,s.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ─────────────────────────────────────────────
// SHIP
// ─────────────────────────────────────────────
function makeShip() {
  return { x:canvas.width/2, y:canvas.height-55, w:26, h:34, speed:5.5 };
}

function drawShip(s) {
  const x=s.x, y=s.y, col=TABLE_HEX[currentTableNum];
  ctx.save();
  if (shieldFlash>0 && Math.floor(shieldFlash/4)%2===0) { ctx.globalAlpha=0.35; }

  // Engine flame
  const fl = ctx.createRadialGradient(x,y+s.h/2+6,1,x,y+s.h/2+6,22);
  fl.addColorStop(0,col+'cc'); fl.addColorStop(1,'transparent');
  ctx.fillStyle=fl;
  ctx.beginPath(); ctx.arc(x,y+s.h/2+6,22,0,Math.PI*2); ctx.fill();

  // Body
  ctx.beginPath();
  ctx.moveTo(x, y-s.h/2);
  ctx.lineTo(x-s.w/2, y+s.h/2);
  ctx.lineTo(x-s.w/4, y+s.h/3);
  ctx.lineTo(x, y+s.h/2-5);
  ctx.lineTo(x+s.w/4, y+s.h/3);
  ctx.lineTo(x+s.w/2, y+s.h/2);
  ctx.closePath();
  ctx.fillStyle=col;
  ctx.shadowColor=col; ctx.shadowBlur=18;
  ctx.fill();

  // Cockpit
  ctx.beginPath(); ctx.ellipse(x,y-s.h/7,6,8,0,0,Math.PI*2);
  ctx.fillStyle='#001828'; ctx.shadowBlur=0; ctx.fill();
  ctx.strokeStyle=col+'88'; ctx.lineWidth=1.5; ctx.stroke();

  // Wings
  ctx.beginPath();
  ctx.moveTo(x-s.w/2,y+s.h/2); ctx.lineTo(x-s.w*.82,y+s.h/2+12); ctx.lineTo(x-s.w/4,y+s.h/3);
  ctx.fillStyle=col+'99'; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x+s.w/2,y+s.h/2); ctx.lineTo(x+s.w*.82,y+s.h/2+12); ctx.lineTo(x+s.w/4,y+s.h/3);
  ctx.fill();
  ctx.restore();
}

// ─────────────────────────────────────────────
// ASTEROIDS — all same colour, no hints
// ─────────────────────────────────────────────
function makeAsteroid(x, y, value, speed) {
  return {
    x, y,
    r: 40 + Math.random()*8,
    vx: (Math.random()-.5)*.7,
    vy: speed,
    value,
    angle: Math.random()*Math.PI*2,
    rotSpeed: (Math.random()-.5)*.025,
    wobble: Math.random()*200,
    destroyed: false,
    hitFlash: 0,     // wrong-hit flash timer
  };
}

function spawnWave() {
  asteroids = [];
  const answers = [correctAnswer, ...makeWrongAnswers(correctAnswer)].sort(()=>Math.random()-.5);
  const spacing = canvas.width / (answers.length+1);
  const speed   = 0.7 + level*0.18;
  answers.forEach((val,i)=>{
    asteroids.push(makeAsteroid(
      spacing*(i+1),
      -60 - Math.random()*100,
      val, speed + Math.random()*.3
    ));
  });
}

function makeWrongAnswers(correct) {
  const w=new Set();
  let attempts=0;
  while(w.size<3 && attempts<200){
    attempts++;
    let v=correct+(Math.floor(Math.random()*18)-9);
    if(v>0&&v!==correct&&!w.has(v)) w.add(v);
  }
  return [...w];
}

function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);

  const flash = a.hitFlash>0 && Math.floor(a.hitFlash/3)%2===0;
  const fillC  = flash ? '#ff3322' : AST_FILL;
  const strkC  = flash ? '#ff6644' : AST_STROKE;
  const shdwC  = flash ? '#ff4422' : AST_SHADOW;

  const pts=11;
  // Draw rocky blob
  ctx.beginPath();
  for(let i=0;i<pts;i++){
    const ang=(Math.PI*2/pts)*i;
    const rr=a.r*(0.80+Math.sin(ang*2.7+a.wobble*.01)*0.20);
    i===0?ctx.moveTo(Math.cos(ang)*rr,Math.sin(ang)*rr)
         :ctx.lineTo(Math.cos(ang)*rr,Math.sin(ang)*rr);
  }
  ctx.closePath();
  ctx.fillStyle=fillC;
  ctx.strokeStyle=strkC;
  ctx.lineWidth=2.5;
  ctx.shadowColor=shdwC; ctx.shadowBlur=10;
  ctx.fill(); ctx.stroke();

  // Craters
  ctx.shadowBlur=0;
  [[-.25,-.2,.28],[.3,.15,.18],[-.1,.35,.16]].forEach(([cx,cy,cr])=>{
    ctx.beginPath(); ctx.arc(cx*a.r,cy*a.r,cr*a.r,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fill();
    ctx.strokeStyle=flash?'#ff4422':'#4466aa44'; ctx.lineWidth=1; ctx.stroke();
  });

  // Number (white, no colour hint)
  ctx.rotate(-a.angle);
  ctx.fillStyle='#ffffff';
  ctx.font=`bold ${a.r*.52}px 'Press Start 2P',monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='#000'; ctx.shadowBlur=6;
  ctx.fillText(a.value,0,0);
  ctx.restore();
}

// ─────────────────────────────────────────────
// BULLETS
// ─────────────────────────────────────────────
function fireBullet() {
  playSound('shoot');
  bullets.push({ x:ship.x, y:ship.y-ship.h/2+4, vy:-15, r:5 });
}

function drawBullet(b) {
  const col=TABLE_HEX[currentTableNum];
  ctx.save();
  ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
  ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=18; ctx.fill();
  ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.x,b.y+20);
  ctx.strokeStyle=col+'44'; ctx.lineWidth=b.r*1.8; ctx.stroke();
  ctx.restore();
}

// ─────────────────────────────────────────────
// PARTICLES
// ─────────────────────────────────────────────
function burst(x,y,color,n=22,speed=5) {
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2, spd=1+Math.random()*speed;
    particles.push({
      x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
      r:2.5+Math.random()*4,alpha:1,decay:.018+Math.random()*.018,
      color, gravity:.06,
    });
  }
}

// Big fireworks burst for correct hit
function fireworks(x,y) {
  const colors=['#ffdd00','#ff4400','#00ffaa','#00aaff','#ff00cc','#ffffff','#ff8800'];
  // Multiple rings
  colors.forEach((c,ci)=>{
    const n = 20+ci*3;
    for(let i=0;i<n;i++){
      const ang=(Math.PI*2/n)*i, spd=3+ci*1.5+Math.random()*3;
      particles.push({
        x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
        r:2+Math.random()*4,alpha:1,decay:.01+Math.random()*.012,
        color:c, gravity:.04,
        trail:true,
      });
    }
  });
  // Sparks
  for(let i=0;i<50;i++){
    const ang=Math.random()*Math.PI*2, spd=1+Math.random()*10;
    particles.push({
      x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-2,
      r:1.5+Math.random()*2,alpha:1,decay:.014+Math.random()*.02,
      color:'#fff', gravity:.08,
    });
  }
}

function drawParticle(p) {
  ctx.save();
  ctx.globalAlpha=p.alpha;
  ctx.fillStyle=p.color;
  ctx.shadowColor=p.color; ctx.shadowBlur=p.trail?12:6;
  ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ─────────────────────────────────────────────
// FLOATING SCORE TEXT
// ─────────────────────────────────────────────
function addFloatText(x,y,text,color) {
  floatingTexts.push({ x,y,text,color,alpha:1,vy:-1.8,timer:60 });
}

function drawFloatTexts() {
  floatingTexts=floatingTexts.filter(t=>t.alpha>0);
  floatingTexts.forEach(t=>{
    t.y+=t.vy; t.timer--; t.alpha=Math.max(0,t.timer/60);
    ctx.save();
    ctx.globalAlpha=t.alpha;
    ctx.font=`bold 16px 'Press Start 2P',monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=t.color; ctx.shadowColor=t.color; ctx.shadowBlur=14;
    ctx.fillText(t.text,t.x,t.y);
    ctx.restore();
  });
}

// ─────────────────────────────────────────────
// QUESTION POOL
// ─────────────────────────────────────────────
function buildPool(t) {
  const pool=[];
  if(t===0){
    for(let a=1;a<=9;a++) for(let b=1;b<=10;b++) pool.push({a,b,ans:a*b});
  } else {
    for(let b=1;b<=10;b++) pool.push({a:t,b,ans:t*b});
  }
  return pool.sort(()=>Math.random()-.5);
}

function nextQuestion() {
  if(questionIndex>=questionPool.length){
    questionPool=buildPool(currentTableNum); questionIndex=0;
  }
  const q=questionPool[questionIndex++];
  correctAnswer=q.ans;
  document.getElementById('q-text').textContent=`${q.a} × ${q.b} = ?`;
  spawnWave();
}

// ─────────────────────────────────────────────
// HUD UPDATE
// ─────────────────────────────────────────────
function updateHUD() {
  document.getElementById('h-score').textContent=String(Math.max(0,score)).padStart(6,'0');
  document.getElementById('h-level').textContent=level;
  document.querySelectorAll('.life').forEach((el,i)=>{
    el.textContent=i<lives?'🚀':'💀';
    el.style.opacity=i<lives?'1':'.3';
  });
}

// ─────────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────────
function loop(ts) {
  if(!gameRunning) return;
  lastTime=ts;

  // Clear
  ctx.fillStyle='#00000a'; ctx.fillRect(0,0,canvas.width,canvas.height);
  drawStars();

  // Ship move
  if(keys.left  && ship.x>ship.w+4)              ship.x-=ship.speed;
  if(keys.right && ship.x<canvas.width-ship.w-4) ship.x+=ship.speed;

  // Fire
  fireCooldown=Math.max(0,fireCooldown-1);
  if(keys.fire && fireCooldown===0){ fireBullet(); fireCooldown=18; }
  if(shieldFlash>0) shieldFlash--;

  drawShip(ship);

  // Bullets
  bullets=bullets.filter(b=>b.y>-20);
  bullets.forEach(b=>{ b.y+=b.vy; drawBullet(b); });

  // Asteroids
  asteroids.forEach(a=>{
    if(a.destroyed) return;
    if(a.hitFlash>0) a.hitFlash--;
    a.x+=a.vx; a.y+=a.vy; a.angle+=a.rotSpeed;
    // Bounce walls
    if(a.x-a.r<0)            {a.x=a.r;              a.vx=Math.abs(a.vx);}
    if(a.x+a.r>canvas.width) {a.x=canvas.width-a.r; a.vx=-Math.abs(a.vx);}
    drawAsteroid(a);
    // Escaped bottom
    if(a.y-a.r>canvas.height){
      a.destroyed=true;
      if(a.value===correctAnswer){
        // Correct one escaped → lose life
        lives--; updateHUD(); shieldFlash=45;
        burst(a.x,canvas.height-30,'#ff4444',20,4);
        addFloatText(canvas.width/2,canvas.height/2-20,'¡SE ESCAPÓ! -1 VIDA','#ff4444');
        playSound('escape');
        if(lives<=0){setTimeout(gameOver,400);return;}
      }
    }
  });

  // If wave cleared
  if(asteroids.every(a=>a.destroyed)) {
    questionsAnswered++;
    if(questionsAnswered>0 && questionsAnswered%5===0){
      level++; levelUpTimer=110; updateHUD();
    }
    setTimeout(nextQuestion, 300);
    asteroids=[];  // prevent re-trigger
  }

  // Bullet ↔ asteroid
  outer:
  for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    for(let ai=0;ai<asteroids.length;ai++){
      const a=asteroids[ai];
      if(a.destroyed) continue;
      const dx=b.x-a.x, dy=b.y-a.y;
      if(dx*dx+dy*dy < (a.r+b.r)*(a.r+b.r)){
        bullets.splice(bi,1);
        if(a.value===correctAnswer){
          // ✅ CORRECT — FIREWORKS!
          a.destroyed=true;
          fireworks(a.x,a.y);
          score+=1000; updateHUD();
          addFloatText(a.x,a.y-20,'+1000','#00ffaa');
          playSound('correct');
          // Destroy all wrong ones with small pop
          asteroids.forEach(oa=>{if(!oa.destroyed&&oa.value!==correctAnswer){oa.destroyed=true;burst(oa.x,oa.y,'#6688aa',8,3);}});
          questionsAnswered++;
          if(questionsAnswered>0 && questionsAnswered%5===0){level++;levelUpTimer=110;updateHUD();}
          setTimeout(nextQuestion,600);
        } else {
          // ❌ WRONG — flash, -1000
          a.hitFlash=14;
          burst(a.x,a.y,'#ff4422',12,3);
          score=Math.max(0,score-1000); updateHUD();
          addFloatText(a.x,a.y-20,'-1000','#ff4444');
          shieldFlash=35;
          playSound('wrong');
        }
        continue outer;
      }
    }
  }

  // Particles
  particles=particles.filter(p=>p.alpha>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity||.05;
    p.vx*=.98; p.alpha-=p.decay;
    drawParticle(p);
  });

  drawFloatTexts();

  // Level up banner
  if(levelUpTimer>0){
    levelUpTimer--;
    const a=Math.min(1,levelUpTimer/25);
    ctx.save(); ctx.globalAlpha=a;
    ctx.font=`bold ${Math.round(canvas.width*.04+14)}px 'Press Start 2P',monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=TABLE_HEX[currentTableNum];
    ctx.shadowColor=TABLE_HEX[currentTableNum]; ctx.shadowBlur=40;
    ctx.fillText(`⭐ NIVEL ${level} ⭐`, canvas.width/2, canvas.height/2);
    ctx.restore();
  }

  animId=requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────
// GAME LIFECYCLE
// ─────────────────────────────────────────────
function startGame(t) {
  currentTableNum=t;
  document.getElementById('table-select-screen').style.display='none';
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('h-table').textContent=t===0?'×ALL':`×${t}`;

  score=0; lives=3; level=1; questionsAnswered=0;
  fireCooldown=0; shieldFlash=0; levelUpTimer=0;
  bullets=[]; asteroids=[]; particles=[]; floatingTexts=[];
  ship=makeShip();
  questionPool=buildPool(t); questionIndex=0;
  updateHUD(); gameRunning=true;
  nextQuestion();
  if(animId) cancelAnimationFrame(animId);
  lastTime=performance.now();
  animId=requestAnimationFrame(loop);
}

function restartGame(){ startGame(currentTableNum); }

function showTableSelect(){
  gameRunning=false;
  if(animId) cancelAnimationFrame(animId);
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('table-select-screen').style.display='flex';
}

function gameOver(){
  gameRunning=false;
  if(animId) cancelAnimationFrame(animId);
  document.getElementById('ov-emoji').textContent='💥';
  document.getElementById('ov-title').textContent='GAME OVER';
  document.getElementById('ov-score').textContent=`PUNTOS: ${String(Math.max(0,score)).padStart(6,'0')}`;
  document.getElementById('ov-sub').textContent=`¡Sigue practicando, Daniel!\nTabla: ×${currentTableNum===0?'TODAS':currentTableNum} | Nivel: ${level}`;
  document.getElementById('overlay').classList.add('show');
}

// ─────────────────────────────────────────────
// SOUNDS
// ─────────────────────────────────────────────
function playSound(type){
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    const c=new AC();
    if(type==='shoot'){
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type='square';o.frequency.setValueAtTime(900,c.currentTime);
      o.frequency.exponentialRampToValueAtTime(400,c.currentTime+.07);
      g.gain.setValueAtTime(.07,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.09);
      o.start();o.stop(c.currentTime+.09);
    } else if(type==='correct'){
      [[523,.0,.14],[659,.12,.14],[784,.24,.14],[1047,.36,.28]].forEach(([f,d,dur])=>{
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='square';o.frequency.value=f;
        const t=c.currentTime+d;
        g.gain.setValueAtTime(.14,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
        o.start(t);o.stop(t+dur);
      });
    } else if(type==='wrong'){
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type='sawtooth';o.frequency.setValueAtTime(280,c.currentTime);
      o.frequency.exponentialRampToValueAtTime(70,c.currentTime+.28);
      g.gain.setValueAtTime(.12,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.28);
      o.start();o.stop(c.currentTime+.28);
    } else if(type==='escape'){
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type='sawtooth';o.frequency.setValueAtTime(180,c.currentTime);
      o.frequency.exponentialRampToValueAtTime(40,c.currentTime+.5);
      g.gain.setValueAtTime(.14,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.5);
      o.start();o.stop(c.currentTime+.5);
    }
  }catch(e){}
}
